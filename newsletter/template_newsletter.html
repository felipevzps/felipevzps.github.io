<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Latest in Science | Felipe Vaz Peres</title>
  <link rel="shortcut icon" href="../docs/photo_51.ico"/>
  <link rel="stylesheet" href="../style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script defer src="https://umami-proxy.felipe-vzps.workers.dev/worker.js" data-website-id="dac15830-c6a0-4446-b682-eff407735a47" data-host-url="https://umami-proxy.SEU-USUARIO.workers.dev"></script>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-inner">
      <nav class="nav">
        <a href="../index.html#about" data-umami-event="nav-home">FELIPEVZPS</a>
        <a href="../index.html#research" data-umami-event="nav-research">RESEARCH</a>
        <a href="../index.html#hackathon" data-umami-event="nav-hackathon">HACKATHON</a>
        <a href="#" data-umami-event="nav-latest-in-science">LATEST IN SCIENCE</a>
        <a href="../index.html#contact" data-umami-event="nav-contact">CONTACT</a>
      </nav>
    </div>
  </aside>

  <main class="newsletter-container">
    <section class="newsletter-intro">
      <h1>LATEST IN SCIENCE</h1>
      <p>Papers published yesterday, filtered for the topics I follow.</p>
    </section>

    <!-- Filtro de keywords -->
    <div class="filter-bar" id="filterBar"></div>

    <section class="papers-list" id="papersList">
    </section>

  <p class="newsletter-footer">
    <small>* curated by my open-source project, <a href="https://github.com/felipevzps/paper-trackr" target="_blank">paper-trackr</a>.<br/></small>
  </p>
  </main>

  <script>
    // === EXPAND / COLLAPSE PAPERS ===
    document.querySelectorAll('.paper').forEach(paper => {
      paper.addEventListener('click', e => {
        // Ignora cliques em links
        if (e.target.closest('a')) return;

        // Ignora clique se houver seleção de texto
        const selection = window.getSelection();
        if (selection && selection.toString().length > 0) return;

        paper.classList.toggle('expanded');
      });
    });

    // === FILTER SYSTEM ===
    const papers = document.querySelectorAll('.paper');
    const filterBar = document.getElementById('filterBar');

    // Extrai keywords
    const allKeywords = new Set();
    papers.forEach(paper => {
      paper.dataset.keywords.split(',').forEach(k => allKeywords.add(k.trim()));
    });

    // Cria botões dinamicamente
    const filters = ['all', ...Array.from(allKeywords)];
    filters.forEach(keyword => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.textContent = keyword;
      btn.dataset.umamiEvent = 'newsletter-filter-' + keyword;
      if (keyword === 'all') btn.classList.add('active');
      filterBar.appendChild(btn);
    });

    // Filtro de papers
    filterBar.addEventListener('click', e => {
      if (!e.target.classList.contains('filter-btn')) return;

      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');

      const keyword = e.target.textContent;
      papers.forEach(paper => {
        if (keyword === 'all') {
          paper.style.display = 'grid';
        } else {
          const hasKeyword = paper.dataset.keywords.toLowerCase().includes(keyword.toLowerCase());
          paper.style.display = hasKeyword ? 'grid' : 'none';
        }
      });
    });
  </script>
</body>
</html>
